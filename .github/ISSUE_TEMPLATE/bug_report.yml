name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security vulnerabilities, use the process in [SECURITY.md](../../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal sequence of commands or code to trigger the bug.
      placeholder: |
        1. Run `kode ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kode version
      placeholder: "0.1.0  (run: kode --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "e.g. Ubuntu 24.04, macOS 14"
    validations:
      required: true
